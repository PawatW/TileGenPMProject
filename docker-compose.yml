services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: studiopm
      POSTGRES_USER: studiopm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-studiopm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studiopm -d studiopm"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://studiopm:${POSTGRES_PASSWORD:-studiopm}@postgres:5432/studiopm
      JWT_SECRET: ${JWT_SECRET:-dev-secret-please-change-in-production}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_IMAGE_MODEL: ${OPENROUTER_IMAGE_MODEL:-google/gemini-3.1-flash-image-preview}
      FLASK_ENV: ${FLASK_ENV:-production}
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:5001
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
